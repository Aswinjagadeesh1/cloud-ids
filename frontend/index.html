<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud IDS — AI Intrusion Detection Dashboard</title>
  <meta name="description"
    content="Real-time AI-powered cloud intrusion detection dashboard using Isolation Forest ML and Claude AI threat analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #0a0a0a;
      --bg-panel: #111111;
      --bg-card: #111111;
      --border: #1f1f1f;
      --border-glow: #ef4444;
      --text-primary: #f5f5f5;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --accent-primary: #dc2626;
      --accent-secondary: #ea580c;
      --sev-critical: #dc2626;
      --sev-high: #ea580c;
      --sev-medium: #d97706;
      --sev-low: #16a34a;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(220, 38, 38, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(234, 88, 12, 0.03) 0%, transparent 50%);
    }

    #root {
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-card);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent-primary);
      border-radius: 3px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse-ring {
      0% {
        box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(22, 163, 74, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-fade-in {
      animation: fadeInUp 0.4s ease both;
    }

    .header {
      background: var(--bg-panel);
      border-bottom: 2px solid var(--accent-primary);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 32px;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #16a34a;
      background: rgba(22, 163, 74, 0.1);
      padding: 5px 12px;
      border-radius: 20px;
    }

    .live-indicator-dot {
      width: 8px;
      height: 8px;
      background: #16a34a;
      border-radius: 50%;
      animation: pulse-ring 1.5s infinite;
    }

    .search-input {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border 0.3s;
      width: 220px;
    }

    .search-input:focus {
      border-color: var(--accent-primary);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-primary);
      padding: 16px 20px;
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      animation: fadeInUp 0.3s ease both;
      color: var(--text-primary);
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 32px;
      box-shadow: 0 0 40px rgba(220, 38, 38, 0.05);
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color var(--transition), transform var(--transition);
      cursor: default;
    }

    .stat-card:hover {
      border-color: var(--border-glow);
      transform: translateY(-2px);
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-value.primary {
      color: var(--text-primary);
    }

    .stat-value.critical {
      color: #ef4444;
    }

    .stat-value.high {
      color: #ea580c;
    }

    .stat-value.medium {
      color: #d97706;
    }

    .stat-value.low {
      color: #16a34a;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .alert-count {
      background: var(--accent-primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }

    .btn-primary {
      background: var(--accent-primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #b91c1c;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
    }

    .btn-outline:hover {
      background: var(--accent-primary);
      color: #fff;
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--border-glow);
      color: var(--text-primary);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all var(--transition);
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    .pill:hover {
      border-color: var(--border-glow);
    }

    .pill.all.active {
      background: var(--text-muted);
      color: #fff;
      border-color: var(--text-muted);
    }

    .pill.critical.active {
      background: var(--sev-critical);
      color: #fff;
      border-color: var(--sev-critical);
    }

    .pill.high.active {
      background: var(--sev-high);
      color: #fff;
      border-color: var(--sev-high);
    }

    .pill.medium.active {
      background: var(--sev-medium);
      color: #fff;
      border-color: var(--sev-medium);
    }

    .pill.low.active {
      background: var(--sev-low);
      color: #fff;
      border-color: var(--sev-low);
    }

    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #1a1a1a;
    }

    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--accent-primary);
      white-space: nowrap;
    }

    tbody tr.alert-row {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
      animation: fadeInUp 0.3s ease both;
      box-shadow: inset 0 0 0 0 transparent;
    }

    tbody tr.alert-row.row-even {
      background: #111111;
    }

    tbody tr.alert-row.row-odd {
      background: #0f0f0f;
    }

    tbody tr.alert-row:hover {
      background: #1f1f1f;
      box-shadow: inset 3px 0 0 0 var(--accent-primary);
    }

    td {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      vertical-align: top;
    }

    td.mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    td.primary {
      color: var(--text-primary);
      font-weight: 500;
    }

    .details-row td.details-td {
      background: #0f0f0f !important;
      border-left: 3px solid var(--accent-primary);
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .details-row h4 {
      color: var(--text-muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      color: #fff;
    }

    .badge::before {
      content: '●';
      font-size: 8px;
    }

    .badge.Critical {
      background: var(--sev-critical);
    }

    .badge.High {
      background: var(--sev-high);
    }

    .badge.Medium {
      background: var(--sev-medium);
    }

    .badge.Low {
      background: var(--sev-low);
    }

    .explanation {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
      max-width: 380px;
    }

    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-bar-bg {
      width: 60px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .score-text {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    .error-banner {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: #ef4444;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer {
      text-align: center;
      padding: 32px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .main {
        padding: 16px;
      }

      .header {
        padding: 0 16px;
      }

      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel" src="App.jsx"></script>
</body>

</html>
